spring:
  application:
    name: standard-project
  datasource:
    url: jdbc:h2:mem:testdb
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console
  logging:
    level:
      org.hibernate.engine.jdbc.env.internal.JdbcEnvironmentInitiator: WARN